name: DAST Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM
  workflow_dispatch:

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run ZAP Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          target: 'http://localhost:3000'
          docker_name: 'owasp/zap2docker-stable'
          cmd_options: '-j'

      - name: Upload Report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.json

      - name: Fail on High Alerts
        if: always()
        shell: python
        run: |
          import json
          import sys

          try:
            with open('results.json') as f:
              data = json.load(f)

            high_count = 0
            for run in data.get('runs', []):
              for result in run.get('results', []):
                if result.get('level') in ['error', 'warning']:
                    if 'High' in str(result.get('properties', {})) or 'high' in str(result):
                        high_count += 1

            if high_count > 0:
              print(f'Found {high_count} high/critical security issues')
              sys.exit(1)
            else:
              print('No high/critical security issues found')
          except FileNotFoundError:
            print('No scan results found (service may not be running)')
