name: Analytics

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Track deployment
        run: |
          echo "Deployment tracked at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Analytics are stored locally, not transmitted externally
