name: PR Automation

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  pr-description:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Generate PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const additions = files.reduce((sum, f) => sum + f.additions, 0);
            const deletions = files.reduce((sum, f) => sum + f.deletions, 0);
            
            let summary = '## PR Analysis\n\n';
            summary += `- Files changed: ${files.length}\n`;
            summary += `- Additions: ${additions}\n`;
            summary += `- Deletions: ${deletions}\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  size-label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
      - name: Add size label
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const totalChanges = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            
            let sizeLabel;
            if (totalChanges < 50) sizeLabel = 'size: XS';
            else if (totalChanges < 150) sizeLabel = 'size: S';
            else if (totalChanges < 500) sizeLabel = 'size: M';
            else if (totalChanges < 1000) sizeLabel = 'size: L';
            else sizeLabel = 'size: XL';
            
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [sizeLabel]
            });
