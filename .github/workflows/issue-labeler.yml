name: Issue Labeler

on:
  issues:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const content = (issue.title + ' ' + (issue.body || '')).toLowerCase();
            const labelsToAdd = [];

            if (content.includes('bug') || content.includes('error')) labelsToAdd.push('bug');
            if (content.includes('feature') || content.includes('enhancement')) labelsToAdd.push('enhancement');
            if (content.includes('doc')) labelsToAdd.push('documentation');
            if (content.includes('performance') || content.includes('memory')) labelsToAdd.push('performance');
            if (content.includes('security')) labelsToAdd.push('security');

            if (labelsToAdd.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: labelsToAdd
              });
            }
