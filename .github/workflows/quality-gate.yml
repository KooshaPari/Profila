name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Lint with ruff
        run: ruff check src/

      - name: Format check
        run: ruff format --check src/

      - name: Type check with mypy
        run: pip install mypy && mypy src/

      - name: Run tests
        run: pytest --cov=src/

      - name: Security audit
        run: pip install bandit && bandit -r src/
